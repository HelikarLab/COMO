[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "COMO"
dynamic = ["version"]
requires-python = ">=3.10,<3.13"
dependencies = [
    "aiofiles>=24.1.0",
    "aioftp>=0.23.1",
    "cobamp@git+https://github.com/JoshLoecker/cobamp@master",
    "cobra>=0.28.0",
    "fast-bioservices>=0.3.9",
    "kaleido==0.2.1",
    "loguru>=0.7.2",
    "openpyxl>=3.1.5",
    "pandas>=1.3.5",
    "plotly>=5.24.1",
    "pydantic-settings",
    "pydantic>=2.10.3",
    "scanpy>=1.9.8",
    "scikit-learn>=1.5.2",
    "scipy>=1.7.3",
    "setuptools<60.0",
    "statsmodels>=0.14",
    "troppo@git+https://github.com/JoshLoecker/troppo@master",
]

[project.optional-dependencies]
gurobi = [ "gurobipy>=10.0.0" ]
interactive = [
    "ipython>=7.0.0",
    "jupyterlab>=4.0.0",
]
dev = [
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=6.0.0",
    "pytest>=8.0.0",
    "ruff>=0.8.0",
]

[tool.hatch.version]
path = "main/como/__init__.py"

[tool.hatch.build]
packages = ["main/como"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
pythonpath = [ "main/src" ]
